name: CI

on:
  push:
    branches: [ main, v1.7-conformance ]
  pull_request:
    branches: [ main, v1.7-conformance ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Clean-room check
        shell: pwsh
        run: ./eng/clean-room-check.ps1

      - name: Restore
        run: dotnet restore VellumPdf.slnx

      - name: Check for vulnerable packages
        shell: bash
        run: |
          set -euo pipefail
          # Capture output; `set -e` fails the step if `dotnet list` itself errors, so a
          # silent restore failure cannot let a vulnerable package slip through the gate.
          report=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected — see the report above."
            exit 1
          fi

      - name: Build
        run: dotnet build VellumPdf.slnx -c Release --no-restore

      - name: Install PDF validators
        run: sudo apt-get update && sudo apt-get install -y qpdf poppler-utils fonts-dejavu-core fonts-texgyre

      - name: Pull veraPDF Docker image
        run: docker pull verapdf/cli:v1.30.2

      - name: Install veraPDF shim
        run: |
          # The oracle tests shell out to `verapdf`; back it with the official Docker
          # image. The image ENTRYPOINT is /opt/verapdf/verapdf, so arguments pass
          # straight through — the shim must NOT prepend the word "verapdf". Mounting
          # /tmp lets the tests' temp-dir PDF paths resolve identically in-container.
          sudo tee /usr/local/bin/verapdf > /dev/null << 'SHIM'
          #!/bin/sh
          exec docker run --rm -v /tmp:/tmp -w /tmp verapdf/cli:v1.30.2 "$@"
          SHIM
          sudo chmod +x /usr/local/bin/verapdf

      - name: Test
        run: dotnet test VellumPdf.slnx -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ${{ runner.temp }}/coverage

      - name: Enforce coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, glob, os, sys

          cov_dir = os.path.join(os.environ["RUNNER_TEMP"], "coverage")
          files = glob.glob(os.path.join(cov_dir, "**", "coverage.cobertura.xml"), recursive=True)
          if not files:
              print("::error::No coverage.cobertura.xml files found under", cov_dir)
              sys.exit(1)

          THRESHOLD = 68

          # Each test project emits one cobertura report instrumenting the same shared
          # assemblies, so a source line appears in several reports. Merge per (file, line):
          # count each line once, covered if any report covered it. Summing the per-report
          # totals would multiply the shared surface by the number of test projects.
          merged = {}
          for f in sorted(files):
              root = ET.parse(f).getroot()
              file_lines = {}
              # Key by (assembly, file, line) so same-named files in different assemblies
              # (e.g. AssemblyInfo.cs) do not collide.
              for pkg in root.iter("package"):
                  pkgname = pkg.get("name", "")
                  for cls in pkg.iter("class"):
                      fn = cls.get("filename", "")
                      for ln in cls.iter("line"):
                          key = (pkgname, fn, ln.get("number"))
                          file_lines[key] = file_lines.get(key, False) or int(ln.get("hits", 0)) > 0
              fc = sum(1 for v in file_lines.values() if v)
              fv = len(file_lines)
              print(f"  {os.path.relpath(f, cov_dir)}: covered={fc}, valid={fv}, line-rate={fc/fv if fv else 0:.4f}")
              for key, v in file_lines.items():
                  merged[key] = merged.get(key, False) or v

          total_valid = len(merged)
          total_covered = sum(1 for v in merged.values() if v)
          combined = total_covered / total_valid if total_valid else 0
          pct = combined * 100
          print(f"Combined (merged) line coverage: {pct:.1f}% over {total_valid} unique lines (threshold: {THRESHOLD}%)")
          if pct < THRESHOLD:
              print(f"::error::Line coverage {pct:.1f}% is below the required threshold of {THRESHOLD}%.")
              sys.exit(1)
          print("Coverage gate passed.")
          EOF

      - name: Format check
        run: dotnet format VellumPdf.slnx --verify-no-changes

      - name: Pack
        run: dotnet pack VellumPdf.slnx -c Release --no-build -o ${{ runner.temp }}/packages

  aot-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: AOT smoke test
        shell: pwsh
        run: ./eng/aot/run-aot-smoke.ps1
