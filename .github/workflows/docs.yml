name: Docs

# Publishes the DocFX API-reference site to GitHub Pages.
#
# To publish: in the repository Settings → Pages, set Source to
# "GitHub Actions". The deploy job is best-effort (continue-on-error), so
# this workflow stays green before Pages is enabled; once it is enabled,
# pushes to main publish the site automatically. Separate, non-gating
# workflow — independent of CI.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'docfx.json'
      - 'toc.yml'
      - 'index.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs for the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Generate API metadata
        run: docfx metadata docfx.json

      - name: Build site
        run: docfx build docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    # Best-effort: until Pages is enabled the deploy API returns 404. This
    # keeps the Docs run green; once Pages is enabled (Settings → Pages →
    # Source: GitHub Actions) the site publishes automatically.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
